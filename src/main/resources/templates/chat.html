<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Chat App</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- SockJS + STOMP -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.1/stomp.min.js"></script>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: 'Poppins', sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            overflow:hidden;
            background: linear-gradient(-45deg,#0f172a,#1e293b,#312e81,#0f172a);
            background-size:400% 400%;
            animation: gradientBG 12s ease infinite;
        }

        @keyframes gradientBG{
            0%{
                background-position:0% 50%;
            }
            50%{
                background-position:100% 50%;
            }
            100%{
                background-position:0% 50%;
            }
        }

        .chat-container{
            width:95%;
            max-width:900px;
            height:90vh;

            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);

            border:1px solid rgba(255,255,255,0.1);

            border-radius:25px;
            overflow:hidden;

            box-shadow:
                    0 8px 32px rgba(0,0,0,0.3);
        }

        .chat-header{
            padding:20px;
            text-align:center;
            color:white;
            font-size:2rem;
            font-weight:600;

            border-bottom:1px solid rgba(255,255,255,0.1);

            background: rgba(255,255,255,0.05);
        }

        #chat{
            height:65vh;
            overflow-y:auto;
            padding:20px;

            display:flex;
            flex-direction:column;
            gap:12px;
        }

        #chat::-webkit-scrollbar{
            width:6px;
        }

        #chat::-webkit-scrollbar-thumb{
            background:#7c3aed;
            border-radius:10px;
        }

        .message{
            padding:12px 18px;
            border-radius:18px;
            max-width:70%;
            color:white;

            animation:fadeIn 0.3s ease;

            word-wrap:break-word;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(10px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        .sent{
            align-self:flex-end;

            background:linear-gradient(135deg,#7c3aed,#4f46e5);

            box-shadow:
                    0 4px 15px rgba(124,58,237,0.4);
        }

        .received{
            align-self:flex-start;

            background:rgba(255,255,255,0.12);
            border:1px solid rgba(255,255,255,0.08);
        }

        .sender-name{
            font-size:0.8rem;
            opacity:0.7;
            margin-bottom:4px;
        }

        .chat-footer{
            padding:20px;
            border-top:1px solid rgba(255,255,255,0.1);

            background: rgba(255,255,255,0.04);
        }

        .form-control{
            background:rgba(255,255,255,0.08);
            border:none;
            color:white;
            border-radius:15px;
            padding:14px;
        }

        .form-control:focus{
            background:rgba(255,255,255,0.12);
            color:white;
            box-shadow:none;
            border:1px solid #7c3aed;
        }

        .form-control::placeholder{
            color:rgba(255,255,255,0.5);
        }

        .btn-send{
            background:linear-gradient(135deg,#7c3aed,#4f46e5);
            border:none;
            color:white;

            padding:12px 24px;
            border-radius:15px;

            transition:0.3s ease;
        }

        .btn-send:hover{
            transform:translateY(-2px) scale(1.03);

            box-shadow:
                    0 6px 20px rgba(124,58,237,0.5);
        }

    </style>
</head>

<body>

<div class="chat-container">

    <div class="chat-header">
        💬 Real-Time Chat
    </div>

    <div id="chat"></div>

    <div class="chat-footer">

        <div class="mb-3">
            <input
                    id="senderInput"
                    type="text"
                    class="form-control"
                    placeholder="Enter your name..."
            >
        </div>

        <div class="input-group">

            <input
                    id="messageInput"
                    type="text"
                    class="form-control"
                    placeholder="Type your message..."
            >

            <button id="sendMessage" class="btn btn-send ms-2">
                Send 🚀
            </button>

        </div>

    </div>

</div>

<script>

    let stompClient = null;

    function setConnected(connected){
        document.getElementById('sendMessage').disabled = !connected;
    }

    function connect(){

        const socket = new SockJS('/chat');

        stompClient = Stomp.over(socket);

        stompClient.connect({}, function(frame){

            console.log("Connected: " + frame);

            setConnected(true);

            stompClient.subscribe('/topic/messages', function(message){

                showMessage(JSON.parse(message.body));

            });

        });

    }

    function showMessage(message){

        const chat = document.getElementById('chat');

        const messageElement = document.createElement('div');

        messageElement.classList.add('message');

        const currentUser =
            document.getElementById('senderInput').value;

        if(message.sender === currentUser){
            messageElement.classList.add('sent');
        }else{
            messageElement.classList.add('received');
        }

        messageElement.innerHTML = `
            <div class="sender-name">${message.sender}</div>
            <div>${message.content}</div>
        `;

        chat.appendChild(messageElement);

        chat.scrollTop = chat.scrollHeight;
    }

    function sendMessage(){

        const sender =
            document.getElementById('senderInput').value;

        const content =
            document.getElementById('messageInput').value;

        if(content.trim() === ''){
            return;
        }

        const chatMessage = {
            sender: sender,
            content: content
        };

        stompClient.send(
            "/app/sendMessage",
            {},
            JSON.stringify(chatMessage)
        );

        document.getElementById('messageInput').value = '';

    }

    document
        .getElementById('sendMessage')
        .onclick = sendMessage;

    document
        .getElementById('messageInput')
        .addEventListener("keypress", function(e){

            if(e.key === "Enter"){
                sendMessage();
            }

        });

    window.onload = connect;

</script>

</body>
</html>
